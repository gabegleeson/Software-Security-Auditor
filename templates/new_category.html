{% extends "base.html" %}

{% block title %}New Category{% endblock %}

{% block content %}
<section class="glass-panel rounded-5 p-4 p-md-5 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a class="btn btn-sm btn-outline-secondary rounded-circle d-inline-flex align-items-center justify-content-center flex-shrink-0"
           style="width: 32px; height: 32px;"
           href="{{ url_for('category_list') }}"
           aria-label="Back to categories"
           title="Back to categories">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
            </svg>
        </a>
    </div>
    <div class="mb-4">
        <span class="badge text-bg-primary rounded-pill px-3 py-2 mb-3">New Category</span>
        <h1 class="display-6 fw-semibold mb-0">Add Category</h1>
    </div>
    {% if error %}
    <div class="alert alert-danger mb-4">{{ error }}</div>
    {% endif %}
    <form method="POST" class="row g-3">
        <div class="col-12">
            <label for="name" class="form-label fw-semibold">Category Name</label>
            <input class="form-control" type="text" id="name" name="name" required placeholder="e.g. Learning Management Systems">
        </div>
        <div class="col-12">
            <label for="genuine_need" class="form-label fw-semibold">Genuine Need</label>
            <textarea class="form-control" id="genuine_need" name="genuine_need" rows="5" required placeholder="Describe the genuine educational or operational need for software in this category&#8230;"></textarea>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary rounded-pill px-4">Create Category</button>
        </div>
    </form>
</section>
{% endblock %}
