<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ 'dark' if dark_mode_enabled else 'light' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Software Security Auditor{% endblock %}</title>
    <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%2316324f' d='M8 0 1.5 3v4.5c0 4.06 2.73 7.78 6.5 8.5 3.77-.72 6.5-4.44 6.5-8.5V3z'/%3E%3Cpath fill='%23ffb703' d='M8 3.2 4.4 4.86v2.7c0 2.63 1.66 5.07 3.6 5.64 1.94-.57 3.6-3.01 3.6-5.64v-2.7z'/%3E%3C/svg%3E"
    >
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <style>
        :root {
            --navy: #16324f;
            --teal: #2f6f7e;
            --sand: #f8f5ef;
            --page-text: #16324f;
            --page-bg:
                radial-gradient(circle at top left, rgba(22, 50, 79, 0.08), transparent 30%),
                linear-gradient(135deg, #eef2f7 0%, #f8f5ef 100%);
            --surface-glass: rgba(255, 255, 255, 0.92);
            --surface-panel: rgba(255, 255, 255, 0.95);
            --surface-card-header: linear-gradient(135deg, #1d3557, #2a5d79);
            --surface-field: #ffffff;
            --surface-subtle: rgba(248, 250, 252, 0.88);
            --surface-subtle-strong: #ffffff;
            --border-soft: rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.08);
            --shadow-panel: 0 18px 40px rgba(15, 23, 42, 0.08);
            --muted-text: #6c757d;
            --table-head-bg: rgba(238, 245, 251, 0.92);
            --table-row-border: rgba(15, 23, 42, 0.08);
            --sidebar-width: 220px;
            --header-height: 58px;
            /* Nav chrome — light mode */
            --nav-bg-from: #1d3557;
            --nav-bg-to:   #2a5d79;
            --nav-border:  rgba(0, 0, 0, 0.12);
            --nav-shadow:  4px 0 20px rgba(15, 23, 42, 0.1);
            --header-shadow: 0 2px 10px rgba(15, 23, 42, 0.15);
        }

        body.dark-mode {
            --page-text: #e5edf6;
            --page-bg:
                radial-gradient(circle at top left, rgba(96, 165, 250, 0.14), transparent 28%),
                linear-gradient(135deg, #0f172a 0%, #111827 55%, #172033 100%);
            --surface-glass: rgba(17, 24, 39, 0.9);
            --surface-panel: rgba(15, 23, 42, 0.94);
            --surface-card-header: linear-gradient(135deg, #2563eb, #1d4ed8);
            --surface-field: rgba(30, 41, 59, 0.96);
            --surface-subtle: rgba(30, 41, 59, 0.72);
            --surface-subtle-strong: rgba(30, 41, 59, 0.96);
            --border-soft: rgba(148, 163, 184, 0.18);
            --shadow-soft: 0 18px 45px rgba(2, 6, 23, 0.42);
            --shadow-panel: 0 18px 40px rgba(2, 6, 23, 0.38);
            --muted-text: #94a3b8;
            --table-head-bg: rgba(30, 41, 59, 0.92);
            --table-row-border: rgba(148, 163, 184, 0.16);
            /* Nav chrome — dark mode */
            --nav-bg-from: #080f1c;
            --nav-bg-to:   #0d2035;
            --nav-border:  rgba(255, 255, 255, 0.06);
            --nav-shadow:  4px 0 24px rgba(0, 0, 0, 0.4);
            --header-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
        }

        /* ── Reset ───────────────────────────────────────────── */

        html, body { height: 100%; margin: 0; }

        body {
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--page-text);
        }

        /* ── Full-width top header ───────────────────────────── */

        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            background: linear-gradient(135deg, var(--nav-bg-from) 0%, var(--nav-bg-to) 100%);
            border-bottom: 1px solid var(--nav-border);
            box-shadow: var(--header-shadow);
        }

        .app-header-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.2), rgba(255, 183, 3, 0.28));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.01em;
        }

        /* Profile dropdown in header */
        .topbar-profile-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .topbar-profile-btn::after { display: none; }

        .topbar-profile-btn:hover,
        .topbar-profile-btn:focus {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

        .topbar-dropdown {
            min-width: 180px;
            border: 1px solid var(--border-soft) !important;
            border-radius: 0.85rem !important;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.18);
            padding: 0.4rem;
            background: var(--surface-panel) !important;
            margin-top: 0.4rem;
        }

        .topbar-dropdown .dropdown-item {
            border-radius: 0.55rem;
            padding: 0.55rem 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--page-text) !important;
            font-size: 0.9rem;
            background: transparent;
        }

        .topbar-dropdown .dropdown-item:hover,
        .topbar-dropdown .dropdown-item:focus {
            background: var(--surface-subtle) !important;
            color: var(--page-text) !important;
        }

        .topbar-dropdown .dropdown-item.text-danger,
        .topbar-dropdown .dropdown-item.text-danger:hover,
        .topbar-dropdown .dropdown-item.text-danger:focus {
            color: #dc3545 !important;
        }

        body.dark-mode .topbar-dropdown .dropdown-item.text-danger,
        body.dark-mode .topbar-dropdown .dropdown-item.text-danger:hover,
        body.dark-mode .topbar-dropdown .dropdown-item.text-danger:focus {
            color: #f87171 !important;
        }

        .topbar-dropdown .dropdown-divider {
            margin: 0.3rem 0;
            border-color: var(--border-soft);
        }

        /* ── Below-header layout ─────────────────────────────── */

        .app-layout {
            display: flex;
            min-height: 100vh;
            padding-top: var(--header-height);
        }

        /* ── Sidebar ─────────────────────────────────────────── */

        .app-sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, var(--nav-bg-from) 0%, var(--nav-bg-to) 100%);
            border-right: 1px solid var(--nav-border);
            box-shadow: var(--nav-shadow);
            position: fixed;
            top: var(--header-height);
            left: 0;
            height: calc(100vh - var(--header-height));
            z-index: 1100;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-nav {
            flex: 1;
            padding: 0.75rem 0.65rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 0.85rem;
            border-radius: 0.75rem;
            color: rgba(255, 255, 255, 0.78);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.16s ease, color 0.16s ease;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .sidebar-link svg { flex-shrink: 0; opacity: 0.85; }

        .sidebar-link:hover,
        .sidebar-link:focus {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .sidebar-link.active svg { opacity: 1; }

        /* Reports sub-items */
        .sidebar-sub {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            padding-left: 2.35rem;
            padding-top: 0.1rem;
        }

        .sidebar-sub-link {
            display: block;
            padding: 0.45rem 0.75rem;
            border-radius: 0.6rem;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 0.82rem;
            transition: background 0.14s ease, color 0.14s ease;
        }

        .sidebar-sub-link:hover,
        .sidebar-sub-link:focus {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .sidebar-sub-link.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar-link .chevron {
            margin-left: auto;
            transition: transform 0.2s ease;
            opacity: 0.6;
        }

        .sidebar-link[aria-expanded="true"] .chevron {
            transform: rotate(180deg);
        }

        /* ── Main content ────────────────────────────────────── */

        .page-shell {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-width: 0;
        }

        .page-content {
            padding: 1.5rem 1.75rem 2rem;
        }

        /* ── Mobile ──────────────────────────────────────────── */

        .sidebar-toggle {
            display: none;
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 0.25rem;
            margin-right: 0.5rem;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1050;
        }

        @media (max-width: 767.98px) {
            .app-sidebar {
                transform: translateX(-100%);
                transition: transform 0.25s ease;
            }

            .app-sidebar.open { transform: translateX(0); }

            .sidebar-toggle { display: flex; align-items: center; }

            .sidebar-overlay.open { display: block; }

            .page-shell { margin-left: 0; }

            .page-content { padding: 1.25rem 1rem 2rem; }
        }

        /* ── Component styles ────────────────────────────────── */

        .glass-panel {
            background: var(--surface-glass);
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(6px);
        }

        .section-card {
            border: 0;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        }

        .section-card .card-header {
            background: var(--surface-card-header);
            color: #fff;
            border: 0;
        }

        .form-control,
        .form-select {
            border-radius: 0.85rem;
            background: var(--surface-field);
            border-color: var(--border-soft);
            color: var(--page-text);
        }

        .form-control::placeholder { color: var(--muted-text); }

        .form-control:focus,
        .form-select:focus {
            background: var(--surface-field);
            color: var(--page-text);
            border-color: rgba(59, 130, 246, 0.55);
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.18);
        }

        textarea.form-control { min-height: 120px; }

        .metric-card {
            border: 0;
            border-radius: 1.25rem;
            background: linear-gradient(160deg, var(--navy), var(--teal));
            color: #fff;
            box-shadow: 0 18px 40px rgba(22, 50, 79, 0.18);
        }

        .metric-card .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.75;
        }

        .table-panel {
            background: var(--surface-panel);
            border-radius: 1.25rem;
            box-shadow: var(--shadow-panel);
            overflow: hidden;
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--page-text);
            --bs-table-border-color: var(--table-row-border);
            --bs-table-striped-bg: rgba(148, 163, 184, 0.06);
            --bs-table-striped-color: var(--page-text);
            --bs-table-hover-bg: rgba(59, 130, 246, 0.08);
            --bs-table-hover-color: var(--page-text);
            margin-bottom: 0;
        }

        .table > :not(caption) > * > * {
            background-color: transparent;
            color: inherit;
            border-bottom-color: var(--table-row-border);
            box-shadow: none;
        }

        .table thead th {
            background: var(--table-head-bg);
            color: var(--page-text);
            font-weight: 700;
            border-bottom-color: var(--table-row-border);
        }

        .table tbody tr:last-child td,
        .table tbody tr:last-child th { border-bottom-width: 0; }

        .table-responsive {
            border: 1px solid var(--border-soft);
            border-radius: 1rem;
            background: transparent;
        }

        .text-secondary,
        .form-text { color: var(--muted-text) !important; }

        body.dark-mode .btn-outline-secondary {
            color: #dbe7f3;
            border-color: rgba(148, 163, 184, 0.3);
        }

        body.dark-mode .btn-outline-secondary:hover,
        body.dark-mode .btn-outline-secondary:focus {
            background: rgba(148, 163, 184, 0.12);
            color: #ffffff;
            border-color: rgba(148, 163, 184, 0.45);
        }

        body.dark-mode .alert-success {
            background: rgba(22, 101, 52, 0.22);
            color: #dcfce7;
            border-color: rgba(74, 222, 128, 0.24);
        }

        body.dark-mode .badge.text-bg-light {
            background: rgba(30, 41, 59, 0.9) !important;
            color: #e5edf6 !important;
            border-color: rgba(148, 163, 184, 0.18) !important;
        }

        body.dark-mode .badge.text-bg-primary {
            background: rgba(37, 99, 235, 0.22) !important;
            color: #dbeafe !important;
        }

        body.dark-mode a.link-dark,
        body.dark-mode .link-dark { color: #e5edf6 !important; }

        body.dark-mode .text-decoration-none { color: inherit; }

        body.dark-mode .status-filter input[type="radio"]:checked + label {
            color: #fff;
            background: rgba(255, 255, 255, 0.14);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        /* ── Password visibility toggle ──────────────────────── */
        .password-field { position: relative; }
        .password-field .form-control { padding-right: 2.6rem; }
        .password-toggle-btn {
            position: absolute;
            right: 0.55rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            padding: 0.2rem 0.3rem;
            cursor: pointer;
            color: var(--muted-text);
            line-height: 1;
            display: flex;
            align-items: center;
        }
        .password-toggle-btn:hover { color: var(--page-text); }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="{% if dark_mode_enabled %}dark-mode{% endif %}">

    {% if session.get('authenticated') %}
    <!-- ── Full-width header ─────────────────────────────── -->
    <header class="app-header">
        <div style="display:flex;align-items:center;gap:0.5rem;">
            <!-- Mobile hamburger -->
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open navigation">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
                </svg>
            </button>
            <a class="app-header-brand" href="{{ url_for('index') }}">
                <span class="brand-mark" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 0 1.5 3v4.5c0 4.06 2.73 7.78 6.5 8.5 3.77-.72 6.5-4.44 6.5-8.5V3z"/>
                        <path d="M8 3.2 4.4 4.86v2.7c0 2.63 1.66 5.07 3.6 5.64 1.94-.57 3.6-3.01 3.6-5.64v-2.7z" fill="rgba(14,35,58,0.38)"/>
                    </svg>
                </span>
                <span class="brand-title">Software Security Auditor</span>
            </a>
        </div>

        <!-- Profile dropdown -->
        <div class="dropdown">
            <button class="topbar-profile-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Account menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                </svg>
            </button>
            <ul class="dropdown-menu dropdown-menu-end topbar-dropdown">
                <li>
                    <a class="dropdown-item" href="{{ url_for('settings') }}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                            <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
                            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52z"/>
                        </svg>
                        Settings
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-danger" href="{{ url_for('logout') }}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                            <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
                            <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
                        </svg>
                        Logout
                    </a>
                </li>
            </ul>
        </div>
    </header>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    {% endif %}

    <div class="app-layout">

        {% if session.get('authenticated') %}
        <!-- ── Sidebar (below header) ────────────────────────── -->
        <aside class="app-sidebar" id="appSidebar">
            <nav class="sidebar-nav" aria-label="Main navigation">
                <!-- Dashboard -->
                <a class="sidebar-link {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                        <path d="M8 4a.5.5 0 0 1 .5.5V6a.5.5 0 0 1-1 0V4.5A.5.5 0 0 1 8 4M3.732 5.732a.5.5 0 0 1 .707 0l.915.914a.5.5 0 1 1-.708.708l-.914-.915a.5.5 0 0 1 0-.707M2 10a.5.5 0 0 1 .5-.5h1.586a.5.5 0 0 1 0 1H2.5A.5.5 0 0 1 2 10m9.5 0a.5.5 0 0 1 .5-.5h1.5a.5.5 0 0 1 0 1H12a.5.5 0 0 1-.5-.5m.754-4.246a.5.5 0 0 0-.707 0l-.915.914a.5.5 0 0 0 .708.708l.914-.915a.5.5 0 0 0 0-.707M8 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6m0 1a2 2 0 1 1 0 4 2 2 0 0 1 0-4M10 .5a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0 0 1h3a.5.5 0 0 0 .5-.5"/>
                    </svg>
                    Dashboard
                </a>

                <!-- Software -->

    <template id="pw-toggle-tpl">
        <button type="button" class="password-toggle-btn" aria-label="Show password" tabindex="-1">
            <svg class="pw-eye-open" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
            </svg>
            <svg class="pw-eye-closed" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true" style="display:none">
                <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z"/>
                <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"/>
                <path d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"/>
            </svg>
        </button>
    </template>
    <script>
        // ── Password visibility toggle ───────────────────────────
        const _pwTpl = document.getElementById("pw-toggle-tpl");
        if (_pwTpl) {
            document.querySelectorAll(".password-field").forEach(function (field) {
                field.appendChild(_pwTpl.content.cloneNode(true));
            });
        }
        document.addEventListener("click", function (e) {
            const btn = e.target.closest(".password-toggle-btn");
            if (!btn) return;
            const input = btn.closest(".password-field").querySelector("input");
            const showing = input.type === "text";
            input.type = showing ? "password" : "text";
            btn.querySelector(".pw-eye-open").style.display   = showing ? "" : "none";
            btn.querySelector(".pw-eye-closed").style.display = showing ? "none" : "";
            btn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
        });
    </script>
    <script>
        (function () {
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('appSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (!toggle) return;
            toggle.addEventListener('click', function () {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('open');
            });
            overlay.addEventListener('click', function () {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            });
        })();
    </script>
