<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ 'dark' if dark_mode_enabled else 'light' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Software Security Auditor{% endblock %}</title>
    <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%2316324f' d='M8 0 1.5 3v4.5c0 4.06 2.73 7.78 6.5 8.5 3.77-.72 6.5-4.44 6.5-8.5V3z'/%3E%3Cpath fill='%23ffb703' d='M8 3.2 4.4 4.86v2.7c0 2.63 1.66 5.07 3.6 5.64 1.94-.57 3.6-3.01 3.6-5.64v-2.7z'/%3E%3C/svg%3E"
    >
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <style>
        :root {
            --navy: #16324f;
            --teal: #2f6f7e;
            --sand: #f8f5ef;
            --page-text: #16324f;
            --page-bg:
                radial-gradient(circle at top left, rgba(22, 50, 79, 0.08), transparent 30%),
                linear-gradient(135deg, #eef2f7 0%, #f8f5ef 100%);
            --surface-glass: rgba(255, 255, 255, 0.92);
            --surface-panel: rgba(255, 255, 255, 0.95);
            --surface-card-header: linear-gradient(135deg, #1d3557, #2a5d79);
            --surface-field: #ffffff;
            --surface-subtle: rgba(248, 250, 252, 0.88);
            --surface-subtle-strong: #ffffff;
            --border-soft: rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.08);
            --shadow-panel: 0 18px 40px rgba(15, 23, 42, 0.08);
            --muted-text: #6c757d;
            --table-head-bg: rgba(238, 245, 251, 0.92);
            --table-row-border: rgba(15, 23, 42, 0.08);
        }

        body.dark-mode {
            --page-text: #e5edf6;
            --page-bg:
                radial-gradient(circle at top left, rgba(96, 165, 250, 0.14), transparent 28%),
                linear-gradient(135deg, #0f172a 0%, #111827 55%, #172033 100%);
            --surface-glass: rgba(17, 24, 39, 0.9);
            --surface-panel: rgba(15, 23, 42, 0.94);
            --surface-card-header: linear-gradient(135deg, #2563eb, #1d4ed8);
            --surface-field: rgba(30, 41, 59, 0.96);
            --surface-subtle: rgba(30, 41, 59, 0.72);
            --surface-subtle-strong: rgba(30, 41, 59, 0.96);
            --border-soft: rgba(148, 163, 184, 0.18);
            --shadow-soft: 0 18px 45px rgba(2, 6, 23, 0.42);
            --shadow-panel: 0 18px 40px rgba(2, 6, 23, 0.38);
            --muted-text: #94a3b8;
            --table-head-bg: rgba(30, 41, 59, 0.92);
            --table-row-border: rgba(148, 163, 184, 0.16);
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            color: var(--page-text);
        }

        .page-shell {
            width: min(1100px, calc(100% - 2rem));
            margin: 1.25rem auto 2rem;
        }

        .glass-panel {
            background: var(--surface-glass);
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(6px);
        }

        .section-card {
            border: 0;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        }

        .section-card .card-header {
            background: var(--surface-card-header);
            color: #fff;
            border: 0;
        }

        .form-control,
        .form-select {
            border-radius: 0.85rem;
            background: var(--surface-field);
            border-color: var(--border-soft);
            color: var(--page-text);
        }

        .form-control::placeholder {
            color: var(--muted-text);
        }

        .form-control:focus,
        .form-select:focus {
            background: var(--surface-field);
            color: var(--page-text);
            border-color: rgba(59, 130, 246, 0.55);
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.18);
        }

        textarea.form-control {
            min-height: 120px;
        }

        .app-nav {
            background:
                linear-gradient(135deg, rgba(14, 35, 58, 0.98), rgba(31, 78, 99, 0.94)),
                rgba(22, 50, 79, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 22px 45px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 1100;
        }

        .app-nav .navbar-brand,
        .app-nav .nav-link {
            color: rgba(255, 255, 255, 0.92);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.2), rgba(255, 183, 3, 0.26));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            flex: 0 0 auto;
        }

        .brand-stack {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-title {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
        }

        .app-nav .navbar-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.85rem;
            margin-right: 1rem;
        }

        .nav-pill {
            border-radius: 999px;
            padding: 0.65rem 1rem !important;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }

        .app-nav .nav-link:hover,
        .app-nav .nav-link:focus,
        .app-nav .nav-link.active {
            color: #ffffff;
        }

        .app-nav .nav-link:hover,
        .app-nav .nav-link:focus {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
        }

        .app-nav .nav-link.active {
            background: rgba(255, 255, 255, 0.16);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .nav-icon-button {
            width: 52px;
            height: 52px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .nav-icon-button:hover,
        .nav-icon-button:focus {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
        }

        .nav-icon-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: #ffb703;
            border: 2px solid var(--navy);
        }

        .profile-menu,
        .nav-dropdown-menu {
            min-width: 200px;
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
            padding: 0.5rem;
            z-index: 1200;
        }

        .profile-menu .dropdown-item,
        .nav-dropdown-menu .dropdown-item {
            border-radius: 0.6rem;
            padding: 0.6rem 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--page-text);
            font-size: 0.95rem;
        }

        .profile-menu .dropdown-item:hover,
        .profile-menu .dropdown-item:focus,
        .nav-dropdown-menu .dropdown-item:hover,
        .nav-dropdown-menu .dropdown-item:focus {
            background: #eef5fb;
            color: var(--page-text);
        }

        body.dark-mode .profile-menu .dropdown-item:hover,
        body.dark-mode .profile-menu .dropdown-item:focus,
        body.dark-mode .nav-dropdown-menu .dropdown-item:hover,
        body.dark-mode .nav-dropdown-menu .dropdown-item:focus {
            background: rgba(148, 163, 184, 0.14);
            color: #e5edf6;
        }

        .profile-menu .dropdown-divider {
            margin: 0.35rem 0;
        }

        .nav-dropdown-toggle::after {
            display: none;
        }

        .metric-card {
            border: 0;
            border-radius: 1.25rem;
            background: linear-gradient(160deg, var(--navy), var(--teal));
            color: #fff;
            box-shadow: 0 18px 40px rgba(22, 50, 79, 0.18);
        }

        .metric-card .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.75;
        }

        .table-panel {
            background: var(--surface-panel);
            border-radius: 1.25rem;
            box-shadow: var(--shadow-panel);
            overflow: hidden;
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--page-text);
            --bs-table-border-color: var(--table-row-border);
            --bs-table-striped-bg: rgba(148, 163, 184, 0.06);
            --bs-table-striped-color: var(--page-text);
            --bs-table-hover-bg: rgba(59, 130, 246, 0.08);
            --bs-table-hover-color: var(--page-text);
            margin-bottom: 0;
        }

        .table > :not(caption) > * > * {
            background-color: transparent;
            color: inherit;
            border-bottom-color: var(--table-row-border);
            box-shadow: none;
        }

        .table thead th {
            background: var(--table-head-bg);
            color: var(--page-text);
            font-weight: 700;
            border-bottom-color: var(--table-row-border);
        }

        .table tbody tr:last-child td,
        .table tbody tr:last-child th {
            border-bottom-width: 0;
        }

        .table-responsive {
            border: 1px solid var(--border-soft);
            border-radius: 1rem;
            background: transparent;
        }

        .text-secondary,
        .form-text {
            color: var(--muted-text) !important;
        }

        body.dark-mode .btn-outline-secondary {
            color: #dbe7f3;
            border-color: rgba(148, 163, 184, 0.3);
        }

        body.dark-mode .btn-outline-secondary:hover,
        body.dark-mode .btn-outline-secondary:focus {
            background: rgba(148, 163, 184, 0.12);
            color: #ffffff;
            border-color: rgba(148, 163, 184, 0.45);
        }

        body.dark-mode .alert-success {
            background: rgba(22, 101, 52, 0.22);
            color: #dcfce7;
            border-color: rgba(74, 222, 128, 0.24);
        }

        body.dark-mode .badge.text-bg-light {
            background: rgba(30, 41, 59, 0.9) !important;
            color: #e5edf6 !important;
            border-color: rgba(148, 163, 184, 0.18) !important;
        }

        body.dark-mode .badge.text-bg-primary {
            background: rgba(37, 99, 235, 0.22) !important;
            color: #dbeafe !important;
        }

        body.dark-mode a.link-dark,
        body.dark-mode .link-dark {
            color: #e5edf6 !important;
        }

        body.dark-mode .text-decoration-none {
            color: inherit;
        }

        .navbar-toggler {
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            padding: 0.55rem 0.75rem;
        }

        .navbar-toggler:focus {
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.12);
        }

        .navbar-toggler-icon {
            filter: invert(1);
        }

        @media (max-width: 991.98px) {
            .app-nav .navbar-collapse {
                margin-top: 1rem;
                padding-top: 1rem;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
            }

            .nav-pill {
                width: 100%;
            }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="{% if dark_mode_enabled %}dark-mode{% endif %}">
    <main class="page-shell">
        {% if session.get('authenticated') %}
        <nav class="navbar navbar-expand-lg app-nav rounded-5 px-3 px-lg-4 py-3 mb-4">
            <div class="container-fluid px-0">
                <a class="navbar-brand" href="{{ url_for('index') }}">
                    <span class="brand-mark" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8 0 1.5 3v4.5c0 4.06 2.73 7.78 6.5 8.5 3.77-.72 6.5-4.44 6.5-8.5V3z"/>
                            <path d="M8 3.2 4.4 4.86v2.7c0 2.63 1.66 5.07 3.6 5.64 1.94-.57 3.6-3.01 3.6-5.64v-2.7z" fill="rgba(14,35,58,0.38)"/>
                        </svg>
                    </span>
                    <span class="brand-stack">
                        <span class="brand-title">Software Security Auditor</span>
                    </span>
                </a>
                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#appNav" aria-controls="appNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="appNav">
                    <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                        <a class="nav-link nav-pill px-3 {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">Dashboard</a>
                        <a class="nav-link nav-pill px-3 {% if request.path.startswith(url_for('software_list')) %}active{% endif %}" href="{{ url_for('software_list') }}">Software</a>
                        <a class="nav-link nav-pill px-3 {% if request.path.startswith('/categories') %}active{% endif %}" href="{{ url_for('category_list') }}">Categories</a>
                        <a class="nav-link nav-pill px-3 {% if request.path.startswith(url_for('vendor_list')) %}active{% endif %}" href="{{ url_for('vendor_list') }}">Vendors</a>
                        <div class="dropdown">
                            <button class="nav-link nav-pill nav-dropdown-toggle px-3 dropdown-toggle {% if request.path.startswith('/reports') %}active{% endif %}" type="button" data-bs-toggle="dropdown" aria-expanded="false">Reports</button>
                            <div class="dropdown-menu dropdown-menu-end nav-dropdown-menu">
                                <a class="dropdown-item" href="{{ url_for('reports') }}">Global Data Hosting Map</a>
                                <a class="dropdown-item" href="{{ url_for('vendor_origins') }}">Vendor Country of Origin Map</a>
                                <a class="dropdown-item" href="{{ url_for('age_restriction_graph') }}">Age Restriction Graph</a>
                            </div>
                        </div>
                        <div class="dropdown ms-lg-3 mt-3 mt-lg-0">
                            <button class="btn nav-icon-button dropdown-toggle border-0 shadow-none" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Account menu">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                                </svg>
                            </button>
                            <div class="dropdown-menu dropdown-menu-end profile-menu">
                                <a class="dropdown-item" href="{{ url_for('settings') }}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
                                        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52z"/>
                                    </svg>
                                    Settings
                                </a>
                                <div class="dropdown-divider"></div>
                                <a class="dropdown-item text-danger" href="{{ url_for('logout') }}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                        <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
                                        <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
                                    </svg>
                                    Logout
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
</body>
</html>
