{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="glass-panel rounded-5 p-4 p-md-5 mx-auto" style="max-width: 520px; margin-top: 6rem;">
    <div class="text-center mb-4">
        <span class="badge text-bg-primary rounded-pill px-3 py-2 mb-3">Secure Access</span>
        <h1 class="display-6 fw-semibold mb-2">Sign in</h1>
        <p class="text-secondary mb-0">Enter your login details to open the Software Security Auditor.</p>
    </div>

    <form method="POST">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="mb-3">
            <label class="form-label fw-semibold" for="username">Username</label>
            <input class="form-control" type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold" for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        {% if error_message %}
        <div class="alert alert-danger rounded-4" role="alert">
            {{ error_message }}
        </div>
        {% endif %}
        <button class="btn btn-primary rounded-pill px-4 w-100" type="submit">Login</button>
    </form>
</section>
{% endblock %}
